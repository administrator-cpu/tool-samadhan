name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-lint:
    name: Build and Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run check-types

      - name: Build
        run: npm run build
        env:
          # Ensure build-time environment variables are set to dummy values if required.
          # These are not sensitive and do not connect to a real database.
          NODE_ENV: production
          SKIP_ENV_VALIDATION: "true" # Common flag to skip env check during build
          JWT_SECRET: "ci-test-secret"
          JWT_REFRESH_SECRET: "ci-test-refresh-secret"
